<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Temperature Converter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="title">
      <h1>🌡 Temperature Converter</h1>
      <p>Modern Temperature Unit Converter using HTML, CSS & JavaScript</p>
    </div>

    <div class="input-group">
      <label>Enter Temperature</label>
      <input type="number" id="temperature" placeholder="Enter value">
    </div>

    <div class="row">

      <div class="input-group">
        <label>From</label>
        <select id="fromUnit">
          <option value="celsius">Celsius (°C)</option>
          <option value="fahrenheit">Fahrenheit (°F)</option>
          <option value="kelvin">Kelvin (K)</option>
        </select>
      </div>

      <div class="input-group">
        <label>To</label>
        <select id="toUnit">
          <option value="fahrenheit">Fahrenheit (°F)</option>
          <option value="celsius">Celsius (°C)</option>
          <option value="kelvin">Kelvin (K)</option>
        </select>
      </div>

    </div>

    <button class="convert-btn" onclick="convertTemperature()">
      Convert Temperature
    </button>

    <div class="result">
      <h2>Converted Result</h2>
      <p id="resultText">0 °F</p>
    </div>

    <div class="footer">
      Built by Abeni •
    </div>

  </div>

  <script src="script.js">
  </script>

</body>
</html>
